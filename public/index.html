<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Chat - 智慧對話介面，支援串流回覆、思維折疊、對話分支與工具調用">
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <!-- 左側邊欄 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="btn-new-chat" id="btnNewChat" title="新增對話">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>新增對話</span>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜尋對話..." autocomplete="off">
      </div>
      <nav class="sidebar-nav" id="sessionList">
        <!-- 動態渲染 -->
      </nav>
      <div class="sidebar-footer">
        <button class="btn-settings" id="btnSettings" title="設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
          <span>設定</span>
        </button>
      </div>
    </aside>

    <!-- 側邊欄切換按鈕 -->
    <button class="sidebar-toggle" id="sidebarToggle" title="收闔側邊欄">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
    </button>

    <!-- 右側主區 -->
    <main class="main-area">
      <!-- 頂部導覽列 -->
      <header class="top-bar">
        <div class="model-selector">
          <select id="modelSelect">
            <option value="" disabled selected>等待模型加入</option>
          </select>
        </div>
        <div class="top-bar-title" id="topBarTitle">AI Chat</div>
        <div class="top-bar-actions">
          <button class="btn-icon" id="btnMcpTools" title="MCP 工具">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path
                d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
              </path>
            </svg>
          </button>
        </div>
      </header>

      <!-- 中央對話區 -->
      <div class="chat-area" id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2a10 10 0 0 1 10 10 10 10 0 0 1-10 10A10 10 0 0 1 2 12 10 10 0 0 1 12 2z"></path>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
              <line x1="9" y1="9" x2="9.01" y2="9"></line>
              <line x1="15" y1="9" x2="15.01" y2="9"></line>
            </svg>
          </div>
          <h1>你好！有什麼可以幫助你的嗎？</h1>
          <p>開始一段新對話，或從左側選取歷史紀錄</p>
          <div class="welcome-suggestions">
            <button class="suggestion-chip" data-prompt="幫我寫一段 Python 程式碼">💻 幫我寫程式碼</button>
            <button class="suggestion-chip" data-prompt="解釋量子力學的基本概念">🔬 解釋科學概念</button>
            <button class="suggestion-chip" data-prompt="給我一些創意寫作的靈感">✍️ 創意寫作靈感</button>
            <button class="suggestion-chip" data-prompt="分析這段文字的優缺點">📊 文字分析</button>
          </div>
        </div>
        <div class="messages-container" id="messagesContainer">
          <!-- 動態渲染 -->
        </div>
      </div>

      <!-- 底部輸入區 -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="輸入訊息... (Enter 送出, Shift+Enter 換行)" rows="1"
            autocomplete="off"></textarea>
          <button class="btn-send" id="btnSend" title="送出">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
          <button class="btn-stop hidden" id="btnStop" title="停止回覆">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">AI 可能會產生錯誤資訊，請驗證重要內容</span>
        </div>
      </div>
    </main>
  </div>

  <!-- 設定 Modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>設定</h2>
        <button class="btn-close-modal" id="btnCloseSettings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiKeyInput">API Key</label>
          <div class="api-key-input-wrapper">
            <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
            <button class="btn-toggle-visibility" id="btnToggleApiKey" title="顯示/隱藏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <small>API Key 僅儲存於瀏覽器本地，不會傳送到我們的伺服器</small>
        </div>
        <div class="form-group">
          <label for="apiBaseUrlInput">API Base URL（可選）</label>
          <input type="text" id="apiBaseUrlInput" placeholder="https://api.openai.com/v1">
          <small>僅在使用相容 API 時修改</small>
        </div>
        <div class="form-group">
          <label>模型清單</label>
          <div class="model-add-row" style="display: flex; flex-direction: column;">
            <button class="btn-fetch-models" id="btnFetchModels" type="button" style="width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px dashed var(--border-color); background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; transition: 0.2s;">
              載入 API 可用模型
            </button>
          </div>
          <div class="model-tags" id="modelTags">
            <!-- 動態渲染 -->
          </div>
          <small>點擊載入後即可自動獲取並新增模型，至少需保留一個模型</small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-save" id="btnSaveSettings">儲存設定</button>
      </div>
    </div>
  </div>

  <!-- MCP 工具 Modal -->
  <div class="modal-overlay hidden" id="mcpModal">
    <div class="modal">
      <div class="modal-header">
        <h2>MCP 工具管理</h2>
        <button class="btn-close-modal" id="btnCloseMcp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="mcp-description">以下為已註冊的 MCP 工具，AI 可在對話中自動呼叫：</p>
        <div class="mcp-tool-list" id="mcpToolList">
          <!-- 動態渲染 -->
        </div>
      </div>
    </div>
  </div>

  <!-- 刪除確認 Modal -->
  <div class="modal-overlay hidden" id="deleteConfirmModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>刪除對話</h2>
      </div>
      <div class="modal-body">
        <p style="color: var(--text-secondary);">確定要刪除這段對話嗎？此操作無法復原。</p>
      </div>
      <div class="modal-footer" style="gap: 8px;">
        <button class="btn-cancel" id="btnCancelDelete">取消</button>
        <button class="btn-danger" id="btnConfirmDelete">確認刪除</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
